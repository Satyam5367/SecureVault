version: '3.8'

services:
  securevault:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=sqlite:///securevault.db
      - ZAP_API_URL=http://zap:8080
      - ZAP_API_KEY=${ZAP_API_KEY}
    depends_on:
      - zap
    volumes:
      - ./reports:/app/reports
    restart: unless-stopped

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.key=${ZAP_API_KEY} -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true
    ports:
      - "8080:8080"
    restart: unless-stopped
